<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rain on Glass — particle prototype v4</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;font-family:ui-monospace,Menlo,Consolas,monospace}
  #gl{display:block;width:100vw;height:100vh}
  #ui{position:absolute;top:12px;left:12px;padding:11px 13px;background:rgba(10,12,18,.74);
      border:1px solid rgba(255,255,255,.12);border-radius:10px;color:#cdd3e0;font-size:11.5px;
      backdrop-filter:blur(6px);user-select:none;min-width:248px}
  #ui h1{font-size:11.5px;margin:0 0 7px;font-weight:600;letter-spacing:.04em;color:#fff}
  #ui label{display:flex;align-items:center;justify-content:space-between;gap:9px;margin:5px 0}
  #ui input[type=range]{flex:1;accent-color:#5b8cff;height:14px}
  #ui .v{min-width:40px;text-align:right;color:#8fa0c0}
  #ui .row{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap}
  #ui button{background:rgba(91,140,255,.18);border:1px solid rgba(91,140,255,.45);color:#cdd6ff;
      font:inherit;font-size:11px;padding:4px 9px;border-radius:7px;cursor:pointer}
  #ui button:hover{background:rgba(91,140,255,.30)}
  #ui .hint{margin-top:8px;color:#76829c;line-height:1.5}
  #fps{position:absolute;top:12px;right:14px;color:#7c89a6;font-size:12px}
  .hidden{display:none!important}
</style>
</head>
<body>
<canvas id="gl"></canvas>
<div id="fps">–</div>
<div id="ui">
  <h1>RAIN ON GLASS · prototype v4</h1>
  <label>spawn · plain<input id="s_spawn" type="range" min="0" max="120" value="3"><span class="v" id="v_spawn"></span></label>
  <label>spawn · trail<input id="s_spawnT" type="range" min="0" max="120" value="3"><span class="v" id="v_spawnT"></span></label>
  <label>spawn · static<input id="s_spawnS" type="range" min="0" max="120" value="4"><span class="v" id="v_spawnS"></span></label>
  <label>drop size<input id="s_size" type="range" min="0" max="100" value="38"><span class="v" id="v_size"></span></label>
  <label>size variance<input id="s_var" type="range" min="0" max="100" value="60"><span class="v" id="v_var"></span></label>
  <label>merge gain<input id="s_merge" type="range" min="0" max="100" value="100"><span class="v" id="v_merge"></span></label>
  <label>refraction<input id="s_refr" type="range" min="0" max="100" value="73"><span class="v" id="v_refr"></span></label>
  <label>glass fog<input id="s_fog" type="range" min="0" max="100" value="57"><span class="v" id="v_fog"></span></label>
  <label>flow speed<input id="s_grav" type="range" min="0" max="100" value="100"><span class="v" id="v_grav"></span></label>
  <label>meander<input id="s_mean" type="range" min="0" max="100" value="18"><span class="v" id="v_mean"></span></label>
  <label>stop&amp;go apply<input id="s_stop" type="range" min="0" max="100" value="50"><span class="v" id="v_stop"></span></label>
  <label>stop&amp;go freq<input id="s_sgf" type="range" min="0" max="100" value="25"><span class="v" id="v_sgf"></span></label>
  <label>stop decel<input id="s_dec" type="range" min="0" max="100" value="40"><span class="v" id="v_dec"></span></label>
  <label>max stretch<input id="s_str" type="range" min="0" max="100" value="25"><span class="v" id="v_str"></span></label>
  <label>roundness<input id="s_wob" type="range" min="0" max="100" value="65"><span class="v" id="v_wob"></span></label>
  <label>trail life<input id="s_trail" type="range" min="0" max="100" value="55"><span class="v" id="v_trail"></span></label>
  <label>trail width<input id="s_twidth" type="range" min="0" max="100" value="32"><span class="v" id="v_twidth"></span></label>
  <div class="row"><button id="tstyle"></button><button id="copy">設定をコピー</button><span id="copied" style="color:#7fd99a"></span></div>
  <div class="hint">click: 大粒を落とす · H: UI · D: 高さ場デバッグ</div>
</div>

function sh(t,s){ const o=gl.createShader(t); gl.shaderSource(o,s); gl.compileShader(o);
  if(!gl.getShaderParameter(o,gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(o)+'\n'+s); return o; }
function prog(vs,fs){ const p=gl.createProgram(); gl.attachShader(p,sh(gl.VERTEX_SHADER,vs));
  gl.attachShader(p,sh(gl.FRAGMENT_SHADER,fs)); gl.linkProgram(p);
  if(!gl.getProgramParameter(p,gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(p)); return p; }

const VS_FULL = `#version 300 es
in vec2 a_pos; void main(){ gl_Position = vec4(a_pos,0.0,1.0); }`;

const FS_BG = `#version 300 es
precision highp float;
out vec4 o; uniform vec2 u_res; uniform float u_time;
float h21(vec2 p){ p=fract(p*vec2(123.34,456.21)); p+=dot(p,p+45.32); return fract(p.x*p.y); }
void main(){
  vec2 uv = gl_FragCoord.xy/u_res; vec2 p = uv; p.x *= u_res.x/u_res.y;
  vec3 col = mix(vec3(0.015,0.025,0.06), vec3(0.05,0.075,0.14), uv.y);
  for(int i=0;i<16;i++){
    float fi=float(i);
    vec2 c = vec2(h21(vec2(fi,1.0)), h21(vec2(fi,2.0)));
    c.x += 0.10*sin(u_time*0.13+fi*1.7); c.y += 0.07*cos(u_time*0.11+fi*1.3);
    c.x *= u_res.x/u_res.y;
    float rad = 0.035+0.06*h21(vec2(fi,3.0));
    vec3 lc = 0.55+0.45*cos(vec3(0.0,2.1,4.2)+fi*1.7+1.0);
    float d = length(p-c); float glow = smoothstep(rad,0.0,d);
    col += lc*glow*glow*1.35;
  }
  vec2 g = abs(fract(uv*vec2(22.0,13.0))-0.5);
  col += vec3(0.025,0.04,0.06)*smoothstep(0.47,0.5,max(g.x,g.y));
  col *= 1.0-0.5*length(uv-0.5);
  o = vec4(col,1.0);
}`;

const FS_BGIMG = `#version 300 es
precision highp float;
out vec4 o; uniform vec2 u_res; uniform sampler2D u_img; uniform float u_imgAR;
void main(){
  vec2 uv = gl_FragCoord.xy/u_res;
  float scrAR = u_res.x/u_res.y;
  float ratio = scrAR/u_imgAR;          // cover-fit: fill screen, crop overflow
  vec2 st = uv;
  if(ratio >= 1.0){ st.y = 0.5 + (uv.y-0.5)/ratio; }
  else            { st.x = 0.5 + (uv.x-0.5)*ratio; }
  o = vec4(texture(u_img, st).rgb, 1.0);
}`;

const VS_SPLAT = `#version 300 es
in vec2 a_corner; in vec2 a_center; in float a_radius; in float a_seed;
in float a_peak; in vec2 a_dir; in float a_stretch; in float a_phase;
uniform vec2 u_res;
out vec2 v_local; out float v_seed; out float v_peak; out float v_stretch; out float v_phase;
void main(){
  vec2 dir = a_dir; vec2 perp = vec2(-dir.y, dir.x);
  float base = a_radius*3.0;
  vec2 off = perp*(a_corner.x*base) + dir*(a_corner.y*base*a_stretch);
  vec2 px = a_center + off;
  vec2 clip = vec2(px.x/u_res.x*2.0-1.0, 1.0 - px.y/u_res.y*2.0);
  v_local=a_corner; v_seed=a_seed; v_peak=a_peak; v_stretch=a_stretch; v_phase=a_phase;
  gl_Position = vec4(clip,0.0,1.0);
}`;
const FS_SPLAT = `#version 300 es
precision highp float;
in vec2 v_local; in float v_seed; in float v_peak; in float v_stretch; in float v_phase;
uniform float u_wobble;
out vec4 o;
void main(){
  float lx=v_local.x, ly=v_local.y;     // ly>0 head (forward), ly<0 tail (rear)
  float st = clamp(v_stretch-1.0, 0.0, 1.4);
  float tailTaper = mix(0.9, 0.5, clamp(st/1.2,0.0,1.0));   // tail narrows only when fast
  float taper = mix(1.0, tailTaper, smoothstep(0.0,-1.0,ly));
  float lxx = lx/max(taper,0.25);
  float d = length(vec2(lxx,ly));
  if(d>1.0) discard;
  float ang = atan(ly,lxx);
  float wob = 1.0 + u_wobble*(0.13*sin(ang*3.0+v_seed*6.2831+v_phase)
                            + 0.07*sin(ang*5.0-v_seed*3.1-v_phase*1.3));
  float dd = d/clamp(wob,0.6,1.45);
  float fall = pow(smoothstep(1.0,0.0,dd), 0.72);
  float headLo = mix(0.86, 0.4, clamp(st,0.0,1.0));         // round when slow
  float headW = mix(headLo, 1.0, smoothstep(-0.7,0.5,ly));
  o = vec4(v_peak*fall*headW, 0.0, 0.0, 0.0);
}`;

const VS_RIBBON = `#version 300 es
in vec2 a_pos; in float a_edge; in float a_peak;
uniform vec2 u_res;
out float v_edge; out float v_peak;
void main(){
  v_edge=a_edge; v_peak=a_peak;
  vec2 clip=vec2(a_pos.x/u_res.x*2.0-1.0, 1.0 - a_pos.y/u_res.y*2.0);
  gl_Position=vec4(clip,0.0,1.0);
}`;
const FS_RIBBON = `#version 300 es
precision highp float;
in float v_edge; in float v_peak;
out vec4 o;
void main(){
  float c = 1.0 - v_edge*v_edge;     // rounded (tube) cross-section -> normals -> spec+refraction
  if(c<=0.0) discard;
  o = vec4(v_peak*pow(c,0.62), 0.0, 0.0, 0.0);
}`;

const FS_COMP = `#version 300 es
precision highp float;
out vec4 o; uniform vec2 u_res; uniform sampler2D u_bg; uniform sampler2D u_h;
uniform float u_refr; uniform float u_fog; uniform float u_debug;
float Hat(vec2 px){ return texture(u_h,px/u_res).r; }
void main(){
  vec2 px = gl_FragCoord.xy; vec2 uv = px/u_res; float H = Hat(px);
  if(u_debug>0.5){ o=vec4(vec3(clamp(H,0.0,1.0)),1.0); return; }
  float e=1.6;
  float hL=Hat(px+vec2(-e,0.0)), hR=Hat(px+vec2(e,0.0));
  float hD=Hat(px+vec2(0.0,-e)), hU=Hat(px+vec2(0.0,e));
  vec3 n = normalize(vec3(hL-hR, hD-hU, 0.07));
  vec3 blur=vec3(0.0); float tot=0.0;
  for(int i=-2;i<=2;i++) for(int j=-2;j<=2;j++){
    blur += texture(u_bg,(px+vec2(float(i),float(j))*2.3)/u_res).rgb; tot+=1.0;
  }
  blur/=tot;
  vec3 glass = mix(texture(u_bg,uv).rgb, blur, clamp(u_fog,0.0,1.0))*0.82;
  vec2 roff = n.xy*u_refr*(0.4+H);
  vec3 refr = texture(u_bg, uv+roff).rgb;
  vec3 inv  = texture(u_bg, uv-roff*1.8).rgb;
  refr = mix(refr, inv, clamp(H-0.5,0.0,1.0)*0.5);
  vec3 Ld = normalize(vec3(-0.5,0.6,0.6));
  float spec = pow(max(dot(n,Ld),0.0),30.0);
  float fres = pow(1.0-max(n.z,0.0),3.0);
  vec3 drop = refr + spec*0.9 + fres*0.22;
  float edge = smoothstep(0.03,0.09,H)*(1.0-smoothstep(0.09,0.22,H));
  drop *= 1.0-0.22*edge;
  float mask = smoothstep(0.03,0.12,H);
  o = vec4(mix(glass,drop,mask),1.0);
}`;

// ---- trail ribbon (continuous brush stroke) --------------------------------
const MAXRV=60000;                              // max ribbon vertices
const ribbonData=new Float32Array(MAXRV*4);     // interleaved x,y,edge,peak
let ribN=0;
const ribBuf=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,ribBuf);
gl.bufferData(gl.ARRAY_BUFFER, ribbonData.byteLength, gl.DYNAMIC_DRAW);
const aRPos=gl.getAttribLocation(pRib,'a_pos'),
      aREdge=gl.getAttribLocation(pRib,'a_edge'),
      aRPeak=gl.getAttribLocation(pRib,'a_peak');
const vaoRib=gl.createVertexArray(); gl.bindVertexArray(vaoRib);
gl.bindBuffer(gl.ARRAY_BUFFER,ribBuf);
gl.enableVertexAttribArray(aRPos);  gl.vertexAttribPointer(aRPos,2,gl.FLOAT,false,4*F,0);
gl.enableVertexAttribArray(aREdge); gl.vertexAttribPointer(aREdge,1,gl.FLOAT,false,4*F,2*F);
gl.enableVertexAttribArray(aRPeak); gl.vertexAttribPointer(aRPeak,1,gl.FLOAT,false,4*F,3*F);
gl.bindVertexArray(null);

function makeTarget(){
  const tex=gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  return {tex,fbo:gl.createFramebuffer(),w:0,h:0};
}
const bgT=makeTarget(), hT=makeTarget();

// ---- background photo texture ----------------------------------------------
const Lbgi = { res:gl.getUniformLocation(pBgImg,'u_res'),
               img:gl.getUniformLocation(pBgImg,'u_img'),
               ar:gl.getUniformLocation(pBgImg,'u_imgAR') };
const bgImgTex = gl.createTexture();
let bgImgReady = false, bgImgAR = 1.0;
(function loadBgImage(){
  const img = new Image();
  img.onload = () => {
    bgImgAR = img.naturalWidth / img.naturalHeight;
    gl.bindTexture(gl.TEXTURE_2D, bgImgTex);
    gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
    gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,img);
    gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, false);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
    bgImgReady = true;
  };
  img.src = BG_IMAGE_SRC;
})();
function sizeTarget(t,w,h){
  if(t.w===w&&t.h===h) return; t.w=w; t.h=h;
  gl.bindTexture(gl.TEXTURE_2D,t.tex);
  const internal=extF?gl.RGBA16F:gl.RGBA8, type=extF?gl.HALF_FLOAT:gl.UNSIGNED_BYTE;
  gl.texImage2D(gl.TEXTURE_2D,0,internal,w,h,0,gl.RGBA,type,null);
  gl.bindFramebuffer(gl.FRAMEBUFFER,t.fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,t.tex,0);
}

// ---- droplet simulation ----------------------------------------------------
let W=0,H=0; let simTime=0; const orphans=[]; const TRAIL_FADE=0.7;
const drops=[]; let nextId=1;
function rnd(){ return Math.random(); }
function hash2(ix,iy){ let h=(ix*374761393+iy*668265263)|0; h=(h^(h>>13))*1274126177; return ((h^(h>>16))>>>0)/4294967295; }
function vnoise(x,y){
  const s=0.010; x*=s; y*=s;
  const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy;
  const u=fx*fx*(3-2*fx),v=fy*fy*(3-2*fy);
  const a=hash2(ix,iy),b=hash2(ix+1,iy),c=hash2(ix,iy+1),d=hash2(ix+1,iy+1);
  return a*(1-u)*(1-v)+b*u*(1-v)+c*(1-u)*v+d*u*v;
}
function dropRadius(){
  const base=P.dropSize, vv=P.dropVar;
  let r = base*(1-0.7*vv) + base*1.4*vv*rnd();
  if(rnd()<0.05) r*=1.6;
  return Math.max(0.2, r);
}
function makeDrop(x,y,r,collect){
  return { x,y,r, vx:0,vy:0, dirx:0,diry:1, sliding:false, braking:false, collect,
           seed:rnd(), thick:0.7+rnd()*0.7, phase:rnd()*6.2831, stretch:1,
           stopGo: rnd()<P.stopGoProb, segLen:8+rnd()*38, segTravel:0, stuckTimer:0,
           trailAcc:0, lineAcc:0, r0:r, path:null, trail:false, pinned:false, id:nextId++ };
}
function spawn(x,y,r){ if(drops.length<MAX){ const d=makeDrop(x,y,r,true); d.trail=false; drops.push(d); } }
function spawnTrail(x,y,r){ if(drops.length<MAX){ const d=makeDrop(x,y,r,true); d.trail=true; drops.push(d); } }
function spawnStatic(x,y,r){ if(drops.length<MAX){ const d=makeDrop(x,y,r,true); d.pinned=true; drops.push(d); } }
function depositBead(x,y,r,isLine){
  if(drops.length>=MAX) return;
  const d=makeDrop(x,y,r,false); if(isLine) d.thick=0.5; drops.push(d);
}
function peakFor(d){ return Math.min((0.30+d.r*0.055)*d.thick, 1.6); }

function seedField(){ for(let i=0;i<90;i++) spawn(rnd()*W, rnd()*H, dropRadius()); }

const CELL=42; let grid=new Map();
function gkey(cx,cy){ return cx*73856093 ^ cy*19349663; }
function rebuildGrid(){
  grid.clear();
  for(let i=0;i<drops.length;i++){ const d=drops[i];
    const k=gkey((d.x/CELL)|0,(d.y/CELL)|0); let a=grid.get(k); if(!a){a=[];grid.set(k,a);} a.push(i); }
}

let spawnAcc=0, spawnAccT=0, spawnAccS=0;
function step(dt,P){
  simTime+=dt;
  spawnAcc+=P.spawn*dt;
  while(spawnAcc>=1){ spawnAcc-=1; spawn(rnd()*W, rnd()*H, dropRadius()); }
  spawnAccT+=P.spawnTrail*dt;
  while(spawnAccT>=1){ spawnAccT-=1; spawnTrail(rnd()*W, rnd()*H, dropRadius()); }
  spawnAccS+=P.spawnStatic*dt;
  while(spawnAccS>=1){ spawnAccS-=1; spawnStatic(rnd()*W, rnd()*H, dropRadius()); }
  rebuildGrid();
  const dead=new Set();
  const GSC=0.02, PIN=0.13;

  for(let i=0;i<drops.length;i++){
    const d=drops[i];
    if(dead.has(d.id)) continue;

    if(d.collect) d.r -= dt*P.evap*(d.r<3?1.7:0.5);
    else          d.r -= dt*(d.r0/Math.max(P.trailLife,0.3));   // trail fades from oldest
    d.phase += dt*(0.5+0.9*d.seed);
    if(d.r<0.15){ dead.add(d.id); continue; }

    const w=vnoise(d.x,d.y);
    const drive=d.r*d.r*d.r*GSC, pinF=d.r*d.r*(0.7+1.1*w)*PIN;

    if(!d.sliding){
      d.stretch += (1-d.stretch)*Math.min(1,3.0*dt);
      if(d.collect && !d.pinned) d.r += dt*P.grow*(0.3+0.7*d.seed);
      if(drive>pinF && d.r>4 && !d.pinned){
        d.sliding=true; d.vy=6+rnd()*8; d.vx=(rnd()-0.5)*6; d.segTravel=0; d.segLen=8+rnd()*30;
      }
      continue;
    }

    // sliding -----------------------------------------------------------------
    if(d.stuckTimer>0){
      d.stuckTimer-=dt;
      if(d.collect) d.r += dt*P.grow*0.5;
      d.vx*=0.5; d.vy*=0.5; d.x+=d.vx*dt; d.y+=d.vy*dt;
      d.stretch += (1-d.stretch)*Math.min(1,3.0*dt);
      if(d.stuckTimer<=0){
        d.vy=10+rnd()*14; d.vx += (rnd()<0.5?-1:1)*P.meander*(0.3+0.6*rnd());
        d.segTravel=0; d.segLen=8+rnd()*34;
      }
      continue;
    }

    let dx, dy;
    if(d.braking){
      const k=1-P.sgDecel*dt; d.vx*=k>0?k:0; d.vy*=k>0?k:0;
      dx=d.vx*dt; dy=d.vy*dt; d.x+=dx; d.y+=dy;
      if(Math.hypot(d.vx,d.vy)<6){ d.braking=false; d.stuckTimer=0.25+rnd()*2.0; d.vx=0; d.vy=0; }
    } else {
      const sizeF=Math.min(Math.max((d.r-3)/8,0.10),1.5);
      d.vy += P.grav*dt*sizeF; d.vy*=(1-2.6*dt); d.vx*=(1-1.0*dt);
      dx=d.vx*dt; dy=d.vy*dt; d.x+=dx; d.y+=dy;
      d.segTravel += Math.hypot(dx,dy);
      if(d.segTravel>=d.segLen){
        d.segTravel=0; d.segLen=8+rnd()*38;
        if(d.stopGo && rnd()<P.sgFreq){
          d.braking=true;                          // begin GRADUAL stop
        } else {
          const dir=rnd()<0.5?-1:1;
          d.vx += dir*P.meander*(0.4+rnd())*(0.6+w);
          if(d.vy<10) d.vy=10;
        }
      }
      const sp0=Math.hypot(d.vx,d.vy);
      if(sp0<12 && drive<pinF*1.05){ d.sliding=false; d.braking=false; d.vx=0; d.vy=0; continue; }
    }

    const moved=Math.hypot(dx,dy), sp=Math.hypot(d.vx,d.vy);
    if(sp>2){ d.dirx=d.vx/sp; d.diry=d.vy/sp; }
    // gradual elongation along motion (rounds out when slow)
    const target=1 + Math.min(Math.max((sp-20)/120,0),1)*(P.maxStretch-1);
    d.stretch += (target-d.stretch)*Math.min(1,3.0*dt);

    // trails: connected line and/or discrete beads (coexist)
    if(P.trailLine && d.collect && d.trail){
      if(!d.path) d.path=[];
      const hw=Math.max(0.8, d.r*P.trailWidth);         // rivulet half-width (slider-controlled)
      d.lineAcc += moved;
      if(d.lineAcc>=Math.max(2.0,hw*0.5) || d.path.length===0){
        d.lineAcc=0;
        d.path.push({x:d.x, y:d.y-d.r*0.25, w:hw, t:simTime});
        if(d.path.length>220) d.path.shift();
      }
      const life=Math.max(P.trailLife,0.3);              // tail recedes by age
      while(d.path.length && simTime-d.path[0].t>life) d.path.shift();
    } else if(d.path && d.path.length){
      const life=Math.max(P.trailLife,0.3);
      while(d.path.length && simTime-d.path[0].t>life) d.path.shift();
    }
    if(P.trailBeads && d.trail){
      d.trailAcc += moved;
      const rr=Math.max(1.1,d.r*0.22);
      const spacing=rr*(sp>120?1.4:(sp>50?2.2:3.4));
      if(d.trailAcc>spacing){
        d.trailAcc=0;
        depositBead(d.x+(rnd()-0.5)*d.r*0.3, d.y-d.r*0.6, rr*(0.8+0.5*rnd()), false);
        d.r=Math.cbrt(Math.max(0,d.r*d.r*d.r - rr*rr*rr*0.5));
      }
    }
    if(d.r<2.1){ dead.add(d.id); continue; }

    const cx=(d.x/CELL)|0, cy=(d.y/CELL)|0;
    for(let ox=-1;ox<=1;ox++) for(let oy=-1;oy<=1;oy++){
      const a=grid.get(gkey(cx+ox,cy+oy)); if(!a) continue;
      for(const j of a){
        if(j===i) continue; const e=drops[j];
        if(dead.has(e.id)||e.r>d.r) continue;
        if(Math.hypot(e.x-d.x,e.y-d.y) < d.r*0.9+e.r){
          d.r=Math.cbrt(d.r*d.r*d.r + P.mergeGain*e.r*e.r*e.r); d.vy+=10; dead.add(e.id);
        }
      }
    }
    if(d.y-d.r>H+8) dead.add(d.id);
  }

  if(dead.size){
    for(let i=drops.length-1;i>=0;i--){
      if(dead.has(drops[i].id)){
        const dd=drops[i];
        if(dd.path && dd.path.length>=2){ orphans.push({path:dd.path, tDeath:simTime}); if(orphans.length>200) orphans.shift(); }
        drops.splice(i,1);
      }
    }
  }
  if(orphans.length){ for(let i=orphans.length-1;i>=0;i--) if(simTime-orphans[i].tDeath>TRAIL_FADE) orphans.splice(i,1); }
  if(drops.length>MAX-20){
    for(let i=0;i<drops.length && drops.length>MAX-20;i++){
      if(!drops[i].collect && drops[i].r<3){ drops.splice(i,1); i--; }
    }
  }
}

function uploadInstances(){
  const n=drops.length;
  for(let i=0;i<n;i++){
    const d=drops[i], o=i*STRIDE;
    instData[o]=d.x; instData[o+1]=d.y; instData[o+2]=d.r; instData[o+3]=d.seed;
    instData[o+4]=peakFor(d); instData[o+5]=d.dirx; instData[o+6]=d.diry;
    instData[o+7]=d.stretch; instData[o+8]=d.phase;
  }
  gl.bindBuffer(gl.ARRAY_BUFFER,instBuf);
  gl.bufferSubData(gl.ARRAY_BUFFER,0,instData,0,n*STRIDE);
  return n;
}

function buildRibbons(){
  let v=0; const arr=ribbonData, cap=MAXRV;
  const life=Math.max(P.trailLife,0.3);
  function emit(path, g){
    const n=path.length;
    if(n<2) return;
    for(let k=0;k<n-1 && v+6<=cap;k++){
      const p0=path[k], p1=path[k+1];
      const a0=path[k>0?k-1:k], b0=path[k+1];
      let t0x=b0.x-a0.x, t0y=b0.y-a0.y, l0=Math.hypot(t0x,t0y)||1; t0x/=l0; t0y/=l0;
      const a1=path[k], b1=path[(k+2<n)?k+2:n-1];
      let t1x=b1.x-a1.x, t1y=b1.y-a1.y, l1=Math.hypot(t1x,t1y)||1; t1x/=l1; t1y/=l1;
      const px0=-t0y, py0=t0x, px1=-t1y, py1=t1x;
      const f0=Math.max(0,1-(simTime-p0.t)/life), f1=Math.max(0,1-(simTime-p1.t)/life);
      const wf0=f0*f0*(3.0-2.0*f0), wf1=f1*f1*(3.0-2.0*f1);          // width pinches to a point at the tail
      const pf0=Math.sqrt(f0)*g, pf1=Math.sqrt(f1)*g;               // *g = whole-stroke fade-out on death
      const w0=p0.w*(0.05+0.95*wf0), w1=p1.w*(0.05+0.95*wf1);
      const pk0=(0.16+0.05*p0.w)*pf0, pk1=(0.16+0.05*p1.w)*pf1;
      const L0x=p0.x+px0*w0, L0y=p0.y+py0*w0, R0x=p0.x-px0*w0, R0y=p0.y-py0*w0;
      const L1x=p1.x+px1*w1, L1y=p1.y+py1*w1, R1x=p1.x-px1*w1, R1y=p1.y-py1*w1;
      let o=v*4;
      arr[o]=L0x;arr[o+1]=L0y;arr[o+2]=1;arr[o+3]=pk0; o+=4;
      arr[o]=R0x;arr[o+1]=R0y;arr[o+2]=-1;arr[o+3]=pk0; o+=4;
      arr[o]=R1x;arr[o+1]=R1y;arr[o+2]=-1;arr[o+3]=pk1; o+=4;
      arr[o]=L0x;arr[o+1]=L0y;arr[o+2]=1;arr[o+3]=pk0; o+=4;
      arr[o]=R1x;arr[o+1]=R1y;arr[o+2]=-1;arr[o+3]=pk1; o+=4;
      arr[o]=L1x;arr[o+1]=L1y;arr[o+2]=1;arr[o+3]=pk1; o+=4;
      v+=6;
    }
  }
  for(let di=0; di<drops.length && v+6<=cap; di++){
    const d=drops[di]; if(d.path && d.path.length>=2) emit(d.path, 1.0);
  }
  for(let oi=0; oi<orphans.length && v+6<=cap; oi++){
    const ot=orphans[oi]; const g=Math.max(0, 1-(simTime-ot.tDeath)/TRAIL_FADE);
    if(g>0) emit(ot.path, g);
  }
  ribN=v;
  if(ribN>0){ gl.bindBuffer(gl.ARRAY_BUFFER,ribBuf); gl.bufferSubData(gl.ARRAY_BUFFER,0,ribbonData,0,ribN*4); }
}

function draw(time,P){
  gl.bindFramebuffer(gl.FRAMEBUFFER,bgT.fbo); gl.viewport(0,0,W,H); gl.disable(gl.BLEND);
  if(bgImgReady){
    gl.useProgram(pBgImg); gl.uniform2f(Lbgi.res,W,H); gl.uniform1f(Lbgi.ar,bgImgAR);
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D,bgImgTex); gl.uniform1i(Lbgi.img,0);
    gl.bindVertexArray(vaoFull); gl.drawArrays(gl.TRIANGLES,0,3);
  } else {
    gl.useProgram(pBg); gl.uniform2f(L.bg.res,W,H); gl.uniform1f(L.bg.time,time);
    gl.bindVertexArray(vaoFull); gl.drawArrays(gl.TRIANGLES,0,3);
  }

  const n=uploadInstances();
  gl.bindFramebuffer(gl.FRAMEBUFFER,hT.fbo); gl.viewport(0,0,W,H);
  gl.clearColor(0,0,0,0); gl.clear(gl.COLOR_BUFFER_BIT);
  gl.enable(gl.BLEND); gl.blendFunc(gl.ONE,gl.ONE); gl.blendEquation(gl.MAX);  // height = max(): taller drops sit in front of thinner trails
  buildRibbons();
  if(ribN>0){ gl.useProgram(pRib); gl.uniform2f(L.rib.res,W,H); gl.bindVertexArray(vaoRib); gl.drawArrays(gl.TRIANGLES,0,ribN); }
  gl.useProgram(pSpl); gl.uniform2f(L.spl.res,W,H); gl.uniform1f(L.spl.wob,P.wobble);
  gl.bindVertexArray(vaoSpl);
  if(n>0) gl.drawArraysInstanced(gl.TRIANGLE_STRIP,0,4,n);

  gl.bindFramebuffer(gl.FRAMEBUFFER,null); gl.viewport(0,0,W,H); gl.disable(gl.BLEND);
  gl.useProgram(pComp); gl.uniform2f(L.comp.res,W,H);
  gl.uniform1f(L.comp.refr,P.refr); gl.uniform1f(L.comp.fog,P.fog); gl.uniform1f(L.comp.debug,P.debug?1:0);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D,bgT.tex); gl.uniform1i(L.comp.bg,0);
  gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D,hT.tex);  gl.uniform1i(L.comp.h,1);
  gl.bindVertexArray(vaoFull); gl.drawArrays(gl.TRIANGLES,0,3);
}

// ---- controls --------------------------------------------------------------
const P = { spawn:3, spawnTrail:3, spawnStatic:4, dropSize:4.65, dropVar:0.6, mergeGain:1.0, refr:0.1168, fog:0.57, grav:480,
            grow:1.0, evap:0.22, meander:36, stopGoProb:0.5, sgFreq:0.25, sgDecel:6.6,
            maxStretch:1.375, wobble:0.65, trailLife:20, trailWidth:0.62,
            trailBeads:true, trailLine:true, debug:false };

  const el=document.getElementById(id), v=document.getElementById(vid);
  const upd=()=>{ fn(+el.value); v.textContent=fmt(+el.value); };
  el.addEventListener('input',upd); upd();
}

bind('s_mean','v_mean',   x=>P.meander=x*2.0,       v=>v|0);

let trailMode=2;
function applyTrailMode(){
  P.trailBeads=(trailMode!==1); P.trailLine=(trailMode!==0);
  document.getElementById('tstyle').textContent='軌跡: '+['点々','連続','両方'][trailMode];
}
document.getElementById('tstyle').addEventListener('click',()=>{ trailMode=(trailMode+1)%3; applyTrailMode(); });
applyTrailMode();

document.getElementById('copy').addEventListener('click',()=>{
  const ids=['s_spawn','s_spawnT','s_spawnS','s_size','s_var','s_merge','s_refr','s_fog','s_grav','s_mean','s_stop','s_sgf','s_dec','s_str','s_wob','s_trail','s_twidth'];
  const nm=['spawn','spawnT','spawnS','size','var','merge','refr','fog','flow','meander','sgApply','sgFreq','decel','stretch','round','trail','twidth'];
  let str=ids.map((id,i)=>nm[i]+'='+document.getElementById(id).value).join('  ');
  str+='  trail='+['beads','line','both'][trailMode];
  const note=document.getElementById('copied');
  try{ navigator.clipboard.writeText(str); note.textContent='copied'; }catch(e){ note.textContent=str; }
  setTimeout(()=>note.textContent='',1600);
});

addEventListener('keydown',e=>{
  if(e.key==='h'||e.key==='H') document.getElementById('ui').classList.toggle('hidden');
  if(e.key==='d'||e.key==='D') P.debug=!P.debug;
});
canvas.addEventListener('pointerdown',e=>{
  const r=canvas.getBoundingClientRect();
  const x=(e.clientX-r.left)/r.width*W, y=(e.clientY-r.top)/r.height*H;
  const d=makeDrop(x,y,Math.max(7,P.dropSize*1.5),true);
  d.sliding=true; d.trail=true; d.vy=16; d.vx=(rnd()-0.5)*15; drops.push(d);
});

function resize(){
  const dpr=Math.min(devicePixelRatio||1,1.25);
  W=Math.max(2,Math.floor(innerWidth*dpr)); H=Math.max(2,Math.floor(innerHeight*dpr));
  canvas.width=W; canvas.height=H; sizeTarget(bgT,W,H); sizeTarget(hT,W,H);
}
addEventListener('resize',resize); resize(); seedField();

let last=performance.now(), fpsT=0, fpsN=0;
const fpsEl=document.getElementById('fps');
function frame(now){
  let dt=(now-last)/1000; last=now; dt=Math.min(dt,1/30);
  step(dt,P); draw(now/1000,P);
  fpsN++; fpsT+=dt;
  if(fpsT>=0.5){ fpsEl.textContent=(fpsN/fpsT).toFixed(0)+' fps · '+drops.length+' drops'; fpsN=0; fpsT=0; }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
